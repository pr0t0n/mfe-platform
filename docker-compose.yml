services:
  mfe-platform:
    build:
      context: .
      dockerfile: Dockerfile
    image: mfe-platform:latest
    container_name: mfe-platform
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
